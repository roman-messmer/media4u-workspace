server {
  listen 80;
  server_name _;

  # React-Frontend
  root /usr/share/nginx/html;
  index index.html;

  # SPA: unbekannte Routen auf index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Statische Projekte, strikt ohne SPA-Fallback
  location ^~ /projekte/ {
    # root ist oben schon gesetzt; hier reicht reines try_files
    try_files $uri $uri/ =404;
    # (optional) Directory Listing explizit aus
    autoindex off;
  }

  # Diverses Ordner, unabhängig von React, mit Datei-Übersicht
  location ^~ /diverses/ {
    try_files $uri $uri/ =404;
    autoindex on;
  }

  # Assets lange cachen (Hash-Dateien)
  location ^~ /assets/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public";
    access_log off;
  }

  # HTML nie cachen, damit Änderungen sofort sichtbar sind
  location ~* \.html$ {
    add_header Cache-Control "no-store";
  }
}