<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Schere Stein Papier</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="container">
		
    <h1>Schere, Stein, Papier</h1>
    <p>Wähle eine Option:</p>
    <div class="button-container">
        <button class="button" onclick="playGame('Schere')">
            <img src="schere.jpg" alt="Schere" class="icon">
        </button>
        <button class="button" onclick="playGame('Stein')">
            <img src="stein.jpg" alt="Stein" class="icon">
        </button>
        <button class="button" onclick="playGame('Papier')">
            <img src="papier.jpg" alt="Papier" class="icon">
        </button>
    </div>
    <div class="scoreboard">
        <p>Spieler: <span id="player-score">0</span></p>
        <p>Computer: <span id="computer-score">0</span></p>
    </div>
    <div class="result" id="result"></div>
    <div id="computer-choice" class="computer-choice">
        <p>Der Computer hat gewählt:</p>
        <img id="computer-choice-image" src="" alt="Computer-Wahl" class="choice-image">
    </div>
    <div id="reset-container" style="display: none;">
        <button class="button" onclick="resetGame()">Spiel zurücksetzen</button>
    </div>
		
	</div>
    <script src="script.js"></script>
</body>
</html>
