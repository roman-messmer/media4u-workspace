<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>360 Grad Viewer Pro</title>
    <style>
        /* --- CSS Reset & Variables --- */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --c-primary: #d4a017;
            --c-bg: #000000;
            --c-text: #ffffff;
            --radius-pill: 99px;
        }

        html, body {
            width: 100%; height: 100dvh;
            overflow: hidden; background-color: var(--c-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--c-text);
            position: fixed;
        }

        /* --- Viewer Containers --- */
        .viewer { position: absolute; inset: 0; overflow: hidden; }

        /* WebGL Canvas */
        .viewer__canvas {
            position: absolute; inset: 0;
            cursor: grab; opacity: 0; transition: opacity 1s ease;
            z-index: 1; touch-action: none;
        }
        .viewer__canvas--visible { opacity: 1; }

        /* CSS3D Overlay - WICHTIG: pointer-events: none */
        #css-container {
            position: absolute; inset: 0;
            z-index: 2; pointer-events: none;
        }

        /* Virtuelle Leinwand - WICHTIG: pointer-events: auto */
        .virtual-screen {
            width: 800px; height: 520px; 
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid var(--c-primary);
            border-radius: 12px;
            display: flex; flex-direction: column;
            overflow: hidden; pointer-events: auto;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }
        
        .virtual-screen__header {
            background: #000; color: var(--c-primary);
            padding: 12px 20px; font-weight: 600;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(212, 160, 23, 0.3);
        }

        .virtual-screen__content { flex-grow: 1; position: relative; background: #111; }
        .virtual-screen__content iframe, .virtual-screen__content video {
            position: absolute; inset: 0; width: 100%; height: 100%; border: none;
        }

        /* --- UI & Overlays --- */
        .viewer__ui-layer {
            position: absolute; bottom: max(1.5rem, env(safe-area-inset-bottom)); left: 50%;
            transform: translateX(-50%) translateY(100px); opacity: 0;
            background: rgba(25, 20, 15, 0.9); backdrop-filter: blur(15px);
            padding: 0.6rem 1.2rem; border-radius: var(--radius-pill);
            display: flex; gap: 1rem; align-items: center;
            border: 1px solid rgba(212, 160, 23, 0.3);
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1); z-index: 100;
        }
        .viewer__ui-layer--visible { transform: translateX(-50%) translateY(0); opacity: 1; }

        .viewer__btn {
            background: rgba(255,255,255,0.1); color: #f0e6d2; border: none; padding: 0.7rem 1.5rem;
            border-radius: var(--radius-pill); cursor: pointer; font-weight: 600; 
            display: inline-flex; align-items: center; gap: 0.7rem;
        }
        .viewer__btn--primary { background: var(--c-primary); color: #000; }

        /* Settings Panel */
        .viewer__settings-panel { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%); 
            background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(15px);
            border: 1px solid var(--c-primary); padding: 1.5rem; border-radius: 12px; 
            width: 340px; opacity: 0; visibility: hidden; pointer-events: none;
            transition: all 0.3s ease; z-index: 999;
        }
        .viewer__settings-panel--open { opacity: 1; visibility: visible; pointer-events: auto; transform: translate(-50%, -50%); }

        .viewer__overlay {
            position: absolute; inset: 0; background: #000; z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .viewer__overlay--hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        
        .error-log { position: absolute; top: 0; width: 100%; background: red; color: white; z-index: 9999; display: none; padding: 5px; font-size: 10px; }
    </style>
</head>
<body>

    <div id="error-log" class="error-log"></div>
    <video id="video-source" loop muted playsinline crossorigin="anonymous" style="display: none;"></video>

    <div class="viewer">
        <div class="viewer__overlay" id="main-overlay">
            <h1 style="color:var(--c-primary); margin-bottom:1rem;">360° Viewer Pro</h1>
            <button class="viewer__btn viewer__btn--primary" id="btn-init">Eintreten</button>
        </div>

        <div class="viewer__canvas" id="canvas-container"></div>
        <div id="css-container"></div>

        <div class="viewer__ui-layer" id="ui-layer">
            <button class="viewer__btn" id="btn-settings">Settings</button>
            <label class="viewer__btn">
                Upload <input type="file" id="file-input" hidden>
            </label>
        </div>

        <div class="viewer__settings-panel" id="settings-panel">
            <div style="margin-bottom:1rem; font-weight:bold;">Leinwand Einstellungen</div>
            <label>Einblenden <input type="checkbox" id="setting-vs-toggle"></label><br><br>
            <label>Typ: 
                <select id="setting-vs-type">
                    <option value="web">Webseite</option>
                    <option value="video">Video URL</option>
                </select>
            </label><br><br>
            <label>URL: <input type="text" id="setting-vs-url" value="https://media4u.ch" style="width:100%"></label>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

        // --- State & Elements ---
        const state = {
            lon: 0, lat: 0, targetLon: 0, targetLat: 0,
            isUserInteracting: false,
            onPointerDownPointerX: 0, onPointerDownPointerY: 0,
            onPointerDownLon: 0, onPointerDownLat: 0,
            vsActive: false,
            vsObject: null
        };

        const els = {
            container: document.getElementById('canvas-container'),
            cssContainer: document.getElementById('css-container'),
            btnInit: document.getElementById('btn-init'),
            mainOverlay: document.getElementById('main-overlay'),
            uiLayer: document.getElementById('ui-layer'),
            fileInput: document.getElementById('file-input'),
            btnSettings: document.getElementById('btn-settings'),
            settingsPanel: document.getElementById('settings-panel'),
            vsToggle: document.getElementById('setting-vs-toggle'),
            vsUrl: document.getElementById('setting-vs-url'),
            vsType: document.getElementById('setting-vs-type')
        };

        let camera, scene, renderer, cssScene, cssRenderer, mesh;

        // --- Init ---
        function init() {
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1100);
            scene = new THREE.Scene();
            cssScene = new THREE.Scene();

            // 360 Sphere
            const geometry = new THREE.SphereGeometry(500, 60, 40);
            geometry.scale(-1, 1, 1);
            const material = new THREE.MeshBasicMaterial({ color: 0x333333 });
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            els.container.appendChild(renderer.domElement);

            cssRenderer = new CSS3DRenderer();
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
            els.cssContainer.appendChild(cssRenderer.domElement);

            // Events
            els.container.addEventListener('pointerdown', onPointerDown);
            window.addEventListener('resize', onWindowResize);
            
            // UI
            els.btnSettings.onclick = () => els.settingsPanel.classList.toggle('viewer__settings-panel--open');
            els.vsToggle.onchange = toggleVirtualScreen;

            animate();
        }

        function toggleVirtualScreen() {
            state.vsActive = els.vsToggle.checked;
            if (state.vsActive) {
                const div = document.createElement('div');
                div.className = 'virtual-screen';
                div.innerHTML = `
                    <div class="virtual-screen__header">Live Leinwand</div>
                    <div class="virtual-screen__content">
                        <iframe src="${els.vsUrl.value}"></iframe>
                    </div>
                `;
                state.vsObject = new CSS3DObject(div);
                state.vsObject.position.set(0, 0, -400);
                cssScene.add(state.vsObject);
            } else if (state.vsObject) {
                cssScene.remove(state.vsObject);
            }
        }

        function onPointerDown(e) {
            state.isUserInteracting = true;
            state.onPointerDownPointerX = e.clientX;
            state.onPointerDownPointerY = e.clientY;
            state.onPointerDownLon = state.targetLon;
            state.onPointerDownLat = state.targetLat;
            document.addEventListener('pointermove', onPointerMove);
            document.addEventListener('pointerup', onPointerUp);
        }

        function onPointerMove(e) {
            if (state.isUserInteracting) {
                state.targetLon = (state.onPointerDownPointerX - e.clientX) * 0.1 + state.onPointerDownLon;
                state.targetLat = (e.clientY - state.onPointerDownPointerY) * 0.1 + state.onPointerDownLat;
            }
        }

        function onPointerUp() {
            state.isUserInteracting = false;
            document.removeEventListener('pointermove', onPointerMove);
            document.removeEventListener('pointerup', onPointerUp);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            state.lon += (state.targetLon - state.lon) * 0.1;
            state.lat += (state.targetLat - state.lat) * 0.1;
            state.lat = Math.max(-85, Math.min(85, state.lat));

            const phi = THREE.MathUtils.degToRad(90 - state.lat);
            const theta = THREE.MathUtils.degToRad(state.lon);

            camera.lookAt(
                500 * Math.sin(phi) * Math.cos(theta),
                500 * Math.cos(phi),
                500 * Math.sin(phi) * Math.sin(theta)
            );

            renderer.render(scene, camera);
            if (state.vsActive) cssRenderer.render(cssScene, camera);
        }

        els.btnInit.onclick = () => {
            init();
            els.mainOverlay.classList.add('viewer__overlay--hidden');
            els.container.classList.add('viewer__canvas--visible');
            els.uiLayer.classList.add('viewer__ui-layer--visible');
        };
    </script>
</body>
</html>
