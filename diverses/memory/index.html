<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Memory-Spiel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="container">
  <div class="memory-game">
    <!-- 12 Kartenpaare -->
    <div class="memory-card" data-card="1"><div class="front"></div><div class="back"></div></div>
    <div class="memory-card" data-card="2"><div class="front"></div><div class="back"></div></div>
    <div class="memory-card" data-card="3"><div class="front"></div><div class="back"></div></div>
    <div class="memory-card" data-card="4"><div class="front"></div><div class="back"></div></div>
    <div class="memory-card" data-card="5"><div class="front"></div><div class="back"></div></div>
    <div class="memory-card" data-card="6"><div class="front"></div><div class="back"></div></div>
    <div class="memory-card" data-card="1"><div class="front"></div><div class="back"></div></div>
    <div class="memory-card" data-card="2"><div class="front"></div><div class="back"></div></div>
    <div class="memory-card" data-card="3"><div class="front"></div><div class="back"></div></div>
    <div class="memory-card" data-card="4"><div class="front"></div><div class="back"></div></div>
    <div class="memory-card" data-card="5"><div class="front"></div><div class="back"></div></div>
    <div class="memory-card" data-card="6"><div class="front"></div><div class="back"></div></div>
  </div>
		
	<div class="controls">
		<button id="resetButton">Spiel zurücksetzen</button>
		<div class="stats">
			<p>Versuche: <span id="attempts">0</span></p>
			<p>Highscore: <span id="highscore">-</span></p>
		</div>
	</div>
		
	</div>
  <script src="script.js"></script>
</body>
</html>
