<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="360 Viewer">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>360° Viewer Pro<br>www.media4u.ch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="error-log" class="error-log"></div>
    
    <video id="video-source" loop muted playsinline webkit-playsinline crossorigin="anonymous" style="display: none;"></video>

    <div class="viewer">
        
        <div class="viewer__overlay" id="main-overlay">
            <h1 class="viewer__title">360° Viewer Pro<br>www.media4u.ch</h1>
            <p class="viewer__desc">
                Betritt die immersive Welt. Optimiert für mobile Sensoren und VR-Headsets.
            </p>
            <button class="viewer__btn viewer__btn--primary" id="btn-init">
                <span class="spinner" id="btn-spinner"></span>
                <span id="btn-text">Eintreten</span>
            </button>
        </div>

        <div class="viewer__overlay viewer__overlay--transparent viewer__overlay--hidden" id="play-overlay">
            <button class="viewer__btn viewer__btn--primary" id="btn-force-play">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24" style="margin-right:8px;"><path d="M8 5v14l11-7z"/></svg>
                Sequenz Starten
            </button>
        </div>

        <div class="viewer__vr-divider" id="vr-divider"></div>
        <div class="viewer__canvas" id="canvas-container"></div>

        <div class="viewer__settings-panel" id="settings-panel">
            <div class="viewer__setting-row">
                <label for="setting-format">Medien Format</label>
                <select id="setting-format">
                    <option value="mono">2D Mono (Standard)</option>
                    <option value="sbs">3D Side-by-Side</option>
                    <option value="tb">3D Top-Bottom</option>
                </select>
            </div>
            <div class="viewer__setting-row">
                <label for="setting-rotation">Blickrichtung <span id="rot-val">0°</span></label>
                <input type="range" id="setting-rotation" min="-180" max="180" value="0">
            </div>
            <div class="viewer__setting-row">
                <label for="setting-shape">Geometrie Form <span id="shape-val">0%</span></label>
                <input type="range" id="setting-shape" min="0" max="100" value="0">
            </div>
            <div class="viewer__setting-row">
                <label for="setting-ipd">VR Augenabstand <span id="ipd-val">0</span></label>
                <input type="range" id="setting-ipd" min="-200" max="200" value="0">
            </div>
            <div class="viewer__setting-row">
                <label for="setting-ui-dist">VR UI Abstand <span id="ui-dist-val">0</span></label>
                <input type="range" id="setting-ui-dist" min="-100" max="100" value="0">
            </div>
            <div class="viewer__setting-row">
                <label for="setting-fov">Sichtfeld (Zoom) <span id="fov-val">75°</span></label>
                <input type="range" id="setting-fov" min="40" max="130" value="75">
            </div>
        </div>

        <div class="viewer__ui-layer" id="ui-layer">
            <div class="viewer__switch-group">
                <span>Touch</span>
                <label class="viewer__switch">
                    <input type="checkbox" id="gyro-toggle">
                    <span class="viewer__slider"></span>
                </label>
                <span>Gyro</span>
            </div>

            <div class="viewer__ui-divider"></div>

            <button class="viewer__btn viewer__btn--icon viewer__btn--toggle" id="btn-video-control" title="Play/Pause" style="display: none;">
                <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <svg id="icon-pause" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            </button>
            
            <button class="viewer__btn viewer__btn--icon" id="btn-fullscreen" title="Vollbild">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                </svg>
            </button>

            <button class="viewer__btn viewer__btn--icon" id="btn-cardboard-vr" title="Brillen Modus">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 12V7a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2.5a2.5 2.5 0 0 0-4 0h-3a2.5 2.5 0 0 0-4 0H4a2 2 0 0 1-2-2Z"></path>
                    <circle cx="7" cy="11" r="2"></circle><circle cx="17" cy="11" r="2"></circle>
                </svg>
            </button>

            <button class="viewer__btn viewer__btn--icon" id="btn-settings" data-vr-id="btn-settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>

            <label class="viewer__btn viewer__btn--icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <input type="file" accept="image/*,video/*" class="viewer__file-input" id="file-input">
            </label>
        </div>

    </div>

    <div id="ios-pwa-popup" class="ios-pwa-popup hidden">
        <button class="ios-pwa-popup__close" id="ios-pwa-popup-close">×</button>
        <p style="margin-bottom: 5px;">Für das beste <strong>Vollbild-Erlebnis</strong>:</p>
        <p>Tippe auf <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: bottom; margin: 0 2px;"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg> und dann auf<br><strong>"Zum Home-Bildschirm"</strong>.</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
